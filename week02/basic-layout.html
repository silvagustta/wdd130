<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Gustavo Pereira">
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="A Basic HTML structure" width="128" height="128">
    </header>
    <nav>
        <ul>
            <li><a href="https://byui.edu">BYU-Idaho</a></li>
            <li><a href="https://churchofjesuschrist.org">The Church</a></li>
        </ul>
    </nav>
    <main>
        <h1>Manaus Temple</h1>
        <section>
            <h2>History</h2>
            <p>The Manaus Brazil Temple is a major landmark of The Church of Jesus Christ of
                Latter-day Saints. </p>
        </section>
        <section>
            <h2>Fan fact</h2>
            <p>It is the first temple built in the Amazon basin.</p>
        </section>
    </main>
    <aside>
        <img
          src="https://www.churchofjesuschrist.org/imgs/b0b9e8abdcd841aa2c87d8d7e82120fceba84eea/full/800,/0/default"
          alt="Manaus temple" width="200">
    </aside>
    <footer>
        <p>🐯 Gustavo Pereira</p>
    </footer>
</body>

</html>
